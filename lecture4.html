<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Error Boundary Definition ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 m-8 bg-rose-50 border border-rose-200 rounded-2xl text-rose-800 animate-fade-in text-center max-w-2xl mx-auto mt-20">
                            <h2 className="text-3xl font-bold mb-4">אופס! משהו השתבש.</h2>
                            <p className="mb-6 text-lg">שגיאה התרחשה בטעינת המערכת. הנה פרטי השגיאה:</p>
                            <div dir="ltr" className="font-mono text-sm bg-white p-6 rounded-xl shadow-inner overflow-auto text-left border border-rose-100">
                                {this.state.error && this.state.error.toString()}
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Utils ---
        const fireConfetti = (type = 'success') => {
            if (typeof confetti !== 'function') return;
            if (type === 'success') {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#107c41', '#34d399', '#fde047'] });
            } else if (type === 'logic') {
                confetti({ particleCount: 100, spread: 60, origin: { y: 0.6 }, colors: ['#0ea5e9', '#38bdf8', '#bae6fd'] });
            } else if (type === 'victory') {
                const duration = 4000; const end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#107c41', '#0ea5e9', '#f59e0b', '#fbbf24'] });
                    confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#107c41', '#0ea5e9', '#f59e0b', '#fbbf24'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        };

        const formatCurrency = (val) => {
            const num = parseFloat(val);
            if (isNaN(num)) return val;
            return num.toLocaleString('he-IL');
        };

        // --- Shared Components ---
        const Card = ({ children, className = "", delay = "0ms" }) => (
            <div className={`glass-card rounded-3xl shadow-xl p-6 md:p-8 border border-slate-200 animate-slide-up ${className}`} style={{ animationDelay: delay }}>
                {children}
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", disabled=false }) => {
            const baseStyle = "px-6 py-3 rounded-xl font-bold transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100 flex items-center justify-center gap-2";
            const variants = {
                primary: "bg-brand-600 text-white hover:bg-brand-500 shadow-md",
                success: "bg-emerald-500 text-white hover:bg-emerald-400 shadow-md",
                excel: "bg-excel text-white hover:bg-excel-dark shadow-md animate-pulse-glow",
                outline: "border-2 border-slate-300 text-slate-600 hover:bg-slate-50 hover:border-slate-400",
                danger: "bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100",
                warning: "bg-amber-100 text-amber-700 border border-amber-300 hover:bg-amber-200 shadow-sm"
            };
            return (
                <button disabled={disabled} onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>

        const CashFlowTable = ({ data }) => (

                                        </span>

                                </tr>
                            ))}

                    </table>
                </div>

        );

        // --- Quiz Data ---

                options: [

                    { id: 'd', text: "אין הבדל ממשי, מדובר רק במוסכמת סימונים שונה." }

            {
                id: 3,
                question: "באקסל האמיתי (לא בסימולטור שלנו), נתונה סדרה של 8 תשלומים שנתיים, כל אחד על סך 5,000 ש\"ח. הריבית השנתית היא 4%. מהי הדרך הנכונה להזין את פרמטרי ה-NPER וה-RATE בפונקציה?",
                options: [
                    { id: 'a', text: "יש להזין NPER=8 ו-RATE=4 (ללא סימן %, כפי שעשינו בסימולטור)." },

                    { id: 'd', text: "יש להזין NPER=8 ו-RATE=0.4." }

                    { id: 'd', text: "אקסל לא מסוגל לפתור שאלות כאלו ללא שימוש בפונקציית GOAL SEEK." }

        ];

        // --- Data Models ---
        const DATA = [
            {
                id: 1,
                title: "האדריכלית המבטיחה",
                difficulty: "בינונית",

                                        <h4 className="font-bold text-lg text-slate-800 mb-4">{idx + 1}. {q.question}</h4>
                                        <div className="mb-4">
                                            <span className="text-slate-500 text-sm font-bold uppercase tracking-wider block mb-1">התשובה שלך:</span>
                                            <div className={`flex items-start gap-2 font-medium ${isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                                                <span>{isCorrect ? '✅' : '❌'}</span>
                                                <span>{userAnswerText}</span>
                                            </div>
                                        </div>
                                        <div className="bg-white p-5 rounded-xl border border-slate-100 shadow-sm">
                                            <span className="text-brand-600 text-sm font-bold uppercase tracking-wider flex items-center gap-1 mb-3">
                                                <span>💡</span> רציונל והסבר רב-שלבי:
                                            </span>
                                            <div className="text-slate-700 leading-relaxed whitespace-pre-line">
                                                {q.explanation}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        const ExcelInputRow = ({ label, value, onChange, disabled, hint, hasError, isType, isTargetField, isCompleted, targetValue }) => {
            
            if (isCompleted && isTargetField) {
                return (
                    <div className="flex items-center gap-4 w-full bg-emerald-900/40 p-3 rounded-xl border border-emerald-500/50 relative overflow-hidden">
                        <div className="absolute inset-0 bg-emerald-500/10 animate-pulse"></div>
                        <label className="w-16 font-mono text-lg font-bold uppercase text-left text-emerald-300 relative z-10" dir="ltr">
                            {label}
                        </label>
                        <div className="flex-1 h-12 px-4 rounded-lg bg-emerald-950/80 border-2 border-emerald-400 font-mono text-2xl text-emerald-300 font-bold flex items-center justify-center text-center relative z-10 shadow-[0_0_15px_rgba(16,185,129,0.4)]" dir="ltr">
                            {formatCurrency(targetValue)}
                        </div>
                    </div>
                );
            }
            
            return (
                <div className={`flex items-center gap-4 w-full p-3 rounded-xl border transition-colors relative group
                    ${isTargetField && !isCompleted ? 'bg-brand-900/40 border-brand-500/50 shadow-[0_0_15px_rgba(14,165,233,0.15)]' : 'bg-slate-700/40 border-slate-600/50 hover:bg-slate-700'}`}>
                    
                    <div className="w-16 relative">
                        <label className={`block font-mono text-lg font-bold uppercase text-left transition-colors 
                            ${hasError ? 'text-rose-400' : isTargetField ? 'text-brand-300' : 'text-slate-300'}`} dir="ltr">
                            {label}
                        </label>
                        {isTargetField && !isCompleted && (
                            <span className="absolute -top-6 -right-6 whitespace-nowrap text-xs bg-brand-500 text-white px-2 py-0.5 rounded shadow text-center animate-pulse">
                                🎯 יעד לחישוב
                            </span>
                        )}
                    </div>
                    
                    <input 
                        type="text" 
                        value={value}
                        onChange={(e) => onChange(label.toLowerCase(), e.target.value)}
                        disabled={disabled || (isTargetField && isCompleted)}
                        placeholder={isType ? "0 או 1" : ""}
                        className={`flex-1 h-12 px-4 rounded-lg bg-slate-800/80 border-2 font-mono text-xl text-white text-center outline-none transition-all
                            ${hasError ? 'border-rose-500 bg-rose-900/30 shadow-[0_0_10px_rgba(244,63,94,0.3)]' : isTargetField && !isCompleted ? 'border-brand-500 focus:border-brand-300 focus:bg-slate-800/90' : 'border-slate-500 focus:border-excel focus:bg-slate-800'}
                            ${disabled && !isTargetField ? 'opacity-70 border-emerald-500/50 text-emerald-100' : ''}
                        `}
                        dir="ltr"
                    />
                    
                    {hasError && (
                        <div className="absolute top-1/2 -translate-y-1/2 left-full ml-4 w-64 bg-rose-100 border border-rose-300 text-rose-800 text-sm p-3 rounded-lg shadow-xl z-20 animate-fade-in pointer-events-none before:content-[''] before:absolute before:top-1/2 before:-translate-y-1/2 before:-left-2 before:border-y-8 before:border-y-transparent before:border-r-8 before:border-r-rose-100">
                            <strong>רמז לשדה {label}:</strong><br/>{hint}
                        </div>
                    )}
                </div>
            );
        };

        // --- Main App Logic ---
        const App = () => {
            const [view, setView] = useState('intro'); // intro, practice, quiz_prompt, quiz, summary
            const [qIndex, setQIndex] = useState(0);
            const [stepIndex, setStepIndex] = useState(0);
            
            // Step History hook
            const { history, saveState, getState, setHistory } = useStepHistory();

            const [selectedLogicId, setSelectedLogicId] = useState(null);
            const [logicSubmitted, setLogicSubmitted] = useState(false);
            
            const [excelInputs, setExcelInputs] = useState({ rate: '', nper: '', pmt: '', pv: '', fv: '', type: '0' });
            const [excelFeedback, setExcelFeedback] = useState(null);
            const [excelCompleted, setExcelCompleted] = useState(false);
            const [isRevealed, setIsRevealed] = useState(false);
            const [showHintToUser, setShowHintToUser] = useState(false);
            const excelShakeRef = useRef(null);

            const [showSkipModal, setShowSkipModal] = useState(false);
            const [quizAnswers, setQuizAnswers] = useState(null);
            
            // Track the maximum step reached per question
            const [maxStepReached, setMaxStepReached] = useState({0:0, 1:0, 2:0});

            const startPractice = () => { setView('practice'); window.scrollTo(0,0); };
            
            const restartAll = () => {
                setQIndex(0); setStepIndex(0);
                setHistory({}); setMaxStepReached({0:0, 1:0, 2:0});
                setQuizAnswers(null);
                resetStepState();
                setView('intro');
                window.scrollTo(0,0);
            };

            const retryQuiz = () => {
                setQuizAnswers(null);
                setView('quiz');
                window.scrollTo(0,0);
            };

            const resetStepState = () => {
                setSelectedLogicId(null);
                setLogicSubmitted(false);
                setExcelInputs({ rate: '', nper: '', pmt: '', pv: '', fv: '', type: '0' });
                setExcelFeedback(null);
                setExcelCompleted(false);
                setIsRevealed(false);
                setShowHintToUser(false);
            };

            const captureCurrentState = () => {
                return {
                    selectedLogicId, logicSubmitted, excelInputs: {...excelInputs},
                    excelCompleted, isRevealed, showHintToUser, excelFeedback
                };
            };

            const applySavedState = (saved) => {
                if (saved) {
                    setSelectedLogicId(saved.selectedLogicId);
                    setLogicSubmitted(saved.logicSubmitted);
                    setExcelInputs(saved.excelInputs);
                    setExcelCompleted(saved.excelCompleted);
                    setIsRevealed(saved.isRevealed);
                    setShowHintToUser(saved.showHintToUser);
                    setExcelFeedback(saved.excelFeedback);
                } else {
                    resetStepState();
                }
            };

            const handleTabClick = (targetIdx) => {
                if (targetIdx <= maxStepReached[qIndex] && targetIdx !== stepIndex) {
                    saveState(qIndex, stepIndex, captureCurrentState());
                    applySavedState(getState(qIndex, targetIdx));
                    setStepIndex(targetIdx);
                }
            };

            const handleAdvance = () => {
                const currentQ = DATA[qIndex];
                saveState(qIndex, stepIndex, captureCurrentState());
                
                if (stepIndex < currentQ.steps.length - 1) {
                    const newStep = stepIndex + 1;
                    setMaxStepReached(prev => ({...prev, [qIndex]: Math.max(prev[qIndex], newStep)}));
                    applySavedState(getState(qIndex, newStep));
                    setStepIndex(newStep);
                } else if (qIndex < DATA.length - 1) {
                    const newQ = qIndex + 1;
                    setQIndex(newQ);
                    setStepIndex(0);
                    applySavedState(getState(newQ, 0));
                } else {
                    setView('quiz_prompt');
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleSkipRequest = () => { setShowSkipModal(true); };

            const executeSkip = (showSolutionFirst) => {
                setShowSkipModal(false);
                if (showSolutionFirst) {
                    revealExcelAnswers();
                } else {
                    const currentQ = DATA[qIndex];
                    saveState(qIndex, stepIndex, captureCurrentState());
                    // Force complete all steps in this Q internally to allow smooth max step
                    setMaxStepReached(prev => ({...prev, [qIndex]: currentQ.steps.length - 1}));
                    
                    if (qIndex < DATA.length - 1) {
                        const newQ = qIndex + 1;
                        setQIndex(newQ);
                        setStepIndex(0);
                        applySavedState(getState(newQ, 0));
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        setView('quiz_prompt');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                }
            };

            const handleLogicCheck = (correctId) => {
                if(selectedLogicId === null) return;
                setLogicSubmitted(true);
                if(selectedLogicId === correctId) {
                    fireConfetti('logic');
                }
            };

            const handleExcelInputChange = (field, value) => {
                setExcelInputs(prev => ({ ...prev, [field]: value }));
                setExcelFeedback(null);
            };

            const handleExcelCheck = (expected, hints, visibleFields, targetField, successMsg) => {
                let errorField = null;
                for (const key of visibleFields) {
                    if (key === targetField) continue;
                    
                    const userVal = parseFloat(excelInputs[key] || 0);
                    const expVal = parseFloat(expected[key] || 0);

                    if (userVal !== expVal) { errorField = key; break; }
                }

                if (!errorField) {
                    fireConfetti('success');
                    setExcelInputs(prev => ({...prev, [targetField]: expected[targetField]}));
                    setExcelFeedback({ type: 'success', msg: successMsg || 'תשובה מדויקת! הפונקציה חישבה את הערך בהצלחה.' });
                    setExcelCompleted(true);
                    setShowHintToUser(false);
                } else {
                    if(excelShakeRef.current) {
                        excelShakeRef.current.classList.remove('animate-shake');
                        void excelShakeRef.current.offsetWidth;
                        excelShakeRef.current.classList.add('animate-shake');
                    }
                    setExcelFeedback({ 
                        type: 'error', 
                        field: errorField,
                        msg: `נראה שיש טעות בערך של ${errorField.toUpperCase()}. ראה רמז לצידו.` 
                    });
                }
            };

            const revealExcelAnswers = () => {
                const step = DATA[qIndex].steps[stepIndex];
                if (step.type !== 'excel') return;
                
                const expected = step.expected;
                setExcelInputs({
                    rate: expected.rate !== "" ? expected.rate : "",
                    nper: expected.nper !== "" ? expected.nper : "",
                    pmt: expected.pmt !== "" ? expected.pmt : "",
                    pv: expected.pv !== "" ? expected.pv : "",
                    fv: expected.fv !== "" ? expected.fv : "",
                    type: expected.type !== "" ? expected.type : "0",
                });
                
                setIsRevealed(true);
                setExcelCompleted(true);
                setShowHintToUser(false);
                setExcelFeedback({ 
                    type: 'success', 
                    msg: 'הנה הפתרון המלא. חשוב מאוד לעבור על ההסבר של כל שדה כדי להבין את הלוגיקה והכללים:' 
                });
            };

            // Main routing
            if (view === 'intro') return <IntroTutorial onStart={startPractice} />;
            if (view === 'quiz_prompt') return <QuizPrompt onDecline={() => setView('summary')} onAccept={() => setView('quiz')} />;
            if (view === 'quiz') return <QuizSystem questions={QUIZ_DATA} onComplete={(ans) => { setQuizAnswers(ans); setView('summary'); fireConfetti('victory'); window.scrollTo(0,0); }} />;
            if (view === 'summary') return <FinalSummary answers={quizAnswers} questions={QUIZ_DATA} onRestart={restartAll} onRetryQuiz={retryQuiz} />;

            const currentQ = DATA[qIndex];
            const currentStep = currentQ.steps[stepIndex];
            
            let totalSteps = 0; let completedSteps = 0;
            DATA.forEach((q, i) => {
                totalSteps += q.steps.length;
                if (i < qIndex) {
                    completedSteps += q.steps.length;
                } else if (i === qIndex) {
                    completedSteps += stepIndex;
                    if ((currentStep.type === 'excel' && excelCompleted) || 
                        (currentStep.type === 'logic' && logicSubmitted && selectedLogicId === currentStep.correctOptionId)) {
                        completedSteps += 1;
                    }
                }
            });
            const progressPct = Math.min((completedSteps / totalSteps) * 100, 100);

            const visibleFields = ['rate', 'nper', 'pmt', 'pv', 'fv', 'type'];
            const previousExcelSteps = currentQ.steps.slice(0, stepIndex).filter(s => s.type === 'excel' && s.targetField);

            return (
                <div className="min-h-screen pb-24 relative">
                    <div className="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 shadow-sm mb-8">
                        <div className="max-w-6xl mx-auto px-4 py-3">
                            <div className="flex justify-between items-center mb-2">
                                <div className="flex items-center gap-4">
                                    <span className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                        <span className="text-brand-600 bg-brand-100 w-8 h-8 rounded-full flex items-center justify-center">🎓</span>
                                        תרגיל {qIndex + 1} מתוך {DATA.length}
                                    </span>
                                </div>
                                <div className="flex items-center gap-4">
                                    <button onClick={handleSkipRequest} className="text-sm text-amber-600 hover:text-amber-700 hover:bg-amber-50 px-3 py-1 rounded-lg transition-colors font-semibold">
                                        דלג על השאלה ⏭️
                                    </button>
                                    <span className="font-bold text-brand-600 bg-brand-50 px-3 py-1 rounded-full text-sm border border-brand-200">
                                        {Math.round(progressPct)}%
                                    </span>
                                </div>
                            </div>
                            <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                <div className="bg-brand-500 h-full transition-all duration-700 ease-out" style={{ width: `${progressPct}%` }}></div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto px-4">
                        <div className="grid lg:grid-cols-12 gap-8">
                            
                            <div className="lg:col-span-5 space-y-6">
                                <Card className="border-t-4 border-t-brand-500 sticky top-24">
                                    <div className="flex items-center gap-2 mb-5">
                                        <span className="bg-slate-100 text-slate-600 px-3 py-1 rounded-md text-xs font-bold tracking-widest uppercase border border-slate-200">תיאור מקרה</span>
                                        <span className={`px-3 py-1 rounded-md text-xs font-bold border ${currentQ.difficulty === 'בינונית' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>
                                            רמה: {currentQ.difficulty}
                                        </span>
                                    </div>
                                    <h2 className="text-3xl font-heading font-extrabold text-slate-800 mb-4">{currentQ.title}</h2>
                                    <p className="text-slate-700 text-lg leading-relaxed whitespace-pre-line mb-6">
                                        {currentQ.story}
                                    </p>
                                    <CashFlowTable data={currentQ.cashFlow} />
                                    
                                    <div className="mt-6 bg-brand-50 p-4 rounded-xl border border-brand-100 text-sm">
                                        <h4 className="font-bold text-brand-800 mb-2 flex items-center gap-2"><span>🧭</span> הרציונל לפיתרון:</h4>
                                        <p className="text-brand-900 leading-relaxed">{currentQ.rationale}</p>
                                    </div>
                                </Card>
                            </div>

                            <div className="lg:col-span-7 relative">
                                <div className="flex items-center gap-2 mb-6 bg-white p-2 rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                                    {currentQ.steps.map((s, idx) => {
                                        const isClickable = idx <= maxStepReached[qIndex];
                                        const isActive = idx === stepIndex;
                                        return (
                                            <button 
                                                key={idx} 
                                                onClick={() => handleTabClick(idx)}
                                                disabled={!isClickable}
                                                className={`h-10 px-4 min-w-[80px] rounded-xl transition-colors duration-300 flex items-center justify-center font-bold text-sm outline-none whitespace-nowrap
                                                ${isActive ? 'bg-brand-500 text-white shadow-md' : isClickable ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 cursor-pointer' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
                                                {idx < maxStepReached[qIndex] && !isActive ? '✔️ חזור לשלב ' + (idx+1) : `שלב ${idx + 1}`}
                                            </button>
                                        );
                                    })}
                                </div>

                                {previousExcelSteps.length > 0 && (
                                    <div className="mb-6 bg-emerald-50/80 border border-emerald-200 rounded-2xl p-4 sm:p-5 shadow-sm animate-fade-in">
                                        <h4 className="text-emerald-800 font-bold mb-3 flex items-center gap-2">
                                            <span className="text-xl">📌</span> תוצאות שחישבנו בשלבים קודמים לשימושך:
                                        </h4>
                                        <div className="flex flex-col sm:flex-row flex-wrap gap-3">
                                            {previousExcelSteps.map((pStep, i) => (
                                                <div key={i} className="flex flex-col sm:flex-row items-start sm:items-center gap-2 bg-white border border-emerald-100 px-4 py-2 rounded-xl shadow-sm">
                                                    <span className="text-slate-600 font-medium text-sm">{pStep.title}:</span>
                                                    <span className="font-mono font-bold text-emerald-700 bg-emerald-100/50 px-2 py-0.5 rounded" dir="ltr">
                                                        {pStep.targetField.toUpperCase()} = {formatCurrency(pStep.expected[pStep.targetField])}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {currentStep.type === 'logic' && (
                                    <div className="animate-slide-up">
                                        <div className="bg-white border-2 border-brand-100 p-8 rounded-3xl shadow-lg mb-6 relative overflow-hidden">
                                            <div className="absolute -left-4 -top-4 opacity-[0.03] text-9xl">💡</div>
                                            <h3 className="text-2xl font-heading font-bold text-brand-900 mb-4 relative z-10 flex items-center gap-3">
                                                <span className="text-brand-500 bg-brand-50 p-2 rounded-xl text-2xl">❓</span> 
                                                {currentStep.question}
                                            </h3>
                                            <p className="text-slate-600 text-lg mb-8 relative z-10 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                {currentStep.context}
                                            </p>
                                            
                                            <div className="space-y-4 relative z-10">
                                                {currentStep.options.map(opt => {
                                                    const isSelected = selectedLogicId === opt.id;
                                                    const isCorrectOpt = opt.id === currentStep.correctOptionId;
                                                    
                                                    let btnClass = "w-full text-right p-5 rounded-2xl border-2 transition-all flex items-center justify-between shadow-sm ";
                                                    if (!logicSubmitted) {
                                                        btnClass += isSelected ? "border-brand-500 bg-brand-50 ring-2 ring-brand-200" : "border-slate-200 bg-white hover:border-brand-300 hover:bg-slate-50";
                                                    } else {
                                                        if (isCorrectOpt) btnClass += "border-emerald-500 bg-emerald-50 text-emerald-900 shadow-md";
                                                        else if (isSelected && !isCorrectOpt) btnClass += "border-rose-400 bg-rose-50 text-rose-900";
                                                        else btnClass += "border-slate-100 bg-slate-50/50 opacity-50";
                                                    }

                                                    return (
                                                        <button key={opt.id} onClick={() => !logicSubmitted && setSelectedLogicId(opt.id)} disabled={logicSubmitted} className={btnClass}>
                                                            <span className="font-medium text-lg leading-relaxed">{opt.text}</span>
                                                            {logicSubmitted && isCorrectOpt && <span className="text-emerald-500 text-2xl">✅</span>}
                                                            {logicSubmitted && isSelected && !isCorrectOpt && <span className="text-rose-500 text-2xl">❌</span>}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>

                                        {!logicSubmitted ? (
                                            <div className="flex justify-end mt-6">
                                                <Button onClick={() => handleLogicCheck(currentStep.correctOptionId)} disabled={selectedLogicId === null} variant="primary" className="text-lg px-8">
                                                    בדוק את ההיגיון שלי ⬅️
                                                </Button>
                                            </div>
                                        ) : (
                                            <div className={`p-6 mt-6 rounded-2xl shadow-md border animate-fade-in ${selectedLogicId === currentStep.correctOptionId ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>
                                                <h4 className={`font-bold text-xl mb-3 flex items-center gap-2 ${selectedLogicId === currentStep.correctOptionId ? 'text-emerald-800' : 'text-rose-800'}`}>
                                                    {selectedLogicId === currentStep.correctOptionId ? '✅ פדגוגיה מדויקת!' : '⚠️ כמעט... בוא נחשוב שוב'}
                                                </h4>
                                                <p className="text-slate-700 leading-relaxed text-lg mb-6">
                                                    {selectedLogicId === currentStep.correctOptionId ? currentStep.explanation : currentStep.options.find(o => o.id === selectedLogicId).wrongFeedback}
                                                </p>
                                                <div className="flex justify-end gap-3">
                                                    {selectedLogicId === currentStep.correctOptionId ? (
                                                        <Button onClick={handleAdvance} variant="success" className="text-lg px-8">
                                                            המשך הלאה 🧮
                                                        </Button>
                                                    ) : (
                                                        <Button onClick={() => {setLogicSubmitted(false); setSelectedLogicId(null);}} variant="outline">
                                                            נסה שוב 🔄
                                                        </Button>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {currentStep.type === 'excel' && (() => {
                                    const targetField = currentStep.targetField;
                                    
                                    return (
                                        <div className="animate-slide-up bg-white p-2 sm:p-4 rounded-3xl shadow-xl border border-slate-100">
                                            <div className="mb-6 px-4 pt-4">
                                                <h3 className="text-2xl font-heading font-bold text-slate-800 flex items-center gap-3 mb-3">
                                                    <span className="bg-excel-light text-excel p-2 rounded-xl text-2xl">📊</span> 
                                                    {currentStep.title}
                                                </h3>
                                                <p className="text-slate-600 text-lg leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    {currentStep.instruction}
                                                </p>
                                            </div>

                                            <div ref={excelShakeRef} className="bg-slate-800 p-6 sm:p-8 rounded-3xl shadow-2xl relative border-t-[10px] border-excel mx-2 mb-6">
                                                <div className="absolute top-4 left-4 flex gap-1.5">
                                                    <div className="w-3.5 h-3.5 rounded-full bg-rose-500 shadow-sm"></div>
                                                    <div className="w-3.5 h-3.5 rounded-full bg-amber-500 shadow-sm"></div>
                                                    <div className="w-3.5 h-3.5 rounded-full bg-emerald-500 shadow-sm"></div>
                                                </div>
                                                
                                                <div className="text-center mt-2 mb-4">
                                                    <span className="inline-block bg-rose-100 text-rose-800 px-4 py-2 rounded-lg font-bold text-sm border border-rose-200 shadow-sm">
                                                        🚨 שים לב: בסימולטור זה יש להזין את הריבית (Rate) תמיד ללא סימן %
                                                    </span>
                                                </div>
                                                
                                                <div className="text-center mb-8 mt-2">
                                                    <div dir="ltr" className="inline-flex items-center gap-2 bg-slate-900/50 px-6 py-2 rounded-full border border-slate-700 shadow-inner">
                                                        <span className="text-2xl text-emerald-400 font-bold italic font-serif">fx</span> 
                                                        <span className="text-xl text-slate-300">=</span>
                                                        <span className="text-xl font-bold text-white tracking-widest">{currentStep.isPmtCalculation ? 'PMT' : 'PV'}</span>
                                                        <span className="text-xl text-slate-400">(...)</span>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-col gap-3 max-w-sm mx-auto relative">
                                                    {visibleFields.map(field => {
                                                        const isTarget = field === targetField;
                                                        const hasError = excelFeedback?.type === 'error' && excelFeedback.field === field;
                                                        
                                                        return (
                                                            <ExcelInputRow 
                                                                key={field}
                                                                label={field}
                                                                value={excelInputs[field]}
                                                                onChange={handleExcelInputChange}
                                                                disabled={excelCompleted && !isTarget} 
                                                                hasError={hasError}
                                                                hint={currentStep.hints[field]}
                                                                isType={field === 'type'}
                                                                isTargetField={isTarget}
                                                                isCompleted={excelCompleted}
                                                                targetValue={currentStep.expected[field]}
                                                            />
                                                        );
                                                    })}
                                                </div>
                                                
                                                {showHintToUser && !excelCompleted && (
                                                    <div className="max-w-sm mx-auto mt-6 bg-slate-700 border border-brand-400/50 rounded-xl p-4 animate-fade-in text-brand-100 text-sm shadow-lg text-center">
                                                        <strong>💡 רמז של אלופים:</strong><br/>
                                                        {currentStep.generalHint}
                                                    </div>
                                                )}
                                            </div>

                                            {excelFeedback && (
                                                <div className={`mx-2 p-5 rounded-2xl mb-6 shadow-sm border animate-fade-in flex flex-col gap-4 ${excelFeedback.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-rose-50 border-rose-200 text-rose-800'}`}>
                                                    <div className="flex items-start gap-4">
                                                        <div className="text-3xl">
                                                            {excelFeedback.type === 'success' ? '✅' : '💡'}
                                                        </div>
                                                        <div className="text-lg leading-relaxed pt-1 font-medium">
                                                            {excelFeedback.msg}
                                                            {!isRevealed && excelFeedback.type === 'success' && (
                                                                <p className="mt-2 text-emerald-700 font-normal">{currentStep.explanation}</p>
                                                            )}
                                                        </div>
                                                    </div>
                                                    
                                                    {(isRevealed || excelCompleted) && currentStep.fieldExplanations && (
                                                        <div className="mt-2 bg-white/60 p-5 rounded-xl border border-emerald-200/50 shadow-inner">
                                                            <h5 className="font-bold text-emerald-900 mb-4 flex items-center gap-2">
                                                                <span className="text-xl">🔍</span> פירוט הרציונל לכל שדה:
                                                            </h5>
                                                            <ul className="space-y-3">
                                                                {visibleFields.map(field => (
                                                                    <li key={field} className="flex items-start gap-3 text-emerald-900">
                                                                        <span className="font-mono font-bold uppercase bg-emerald-200/70 text-emerald-800 px-2 py-1 rounded text-sm w-14 text-center shrink-0 border border-emerald-300/50">
                                                                            {field}
                                                                        </span>
                                                                        <span className="leading-relaxed">
                                                                            {currentStep.fieldExplanations[field]}
                                                                        </span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    )}
                                                </div>
                                            )}

                                            <div className="flex flex-col sm:flex-row justify-between items-center gap-3 px-2 mt-8 flex-wrap">
                                                <div className="flex w-full sm:w-auto gap-3 order-2 sm:order-1">
                                                    {!excelCompleted && (
                                                        <Button onClick={() => revealExcelAnswers()} variant="danger" className="flex-1 sm:flex-none text-sm">
                                                            התייאשתי, גלה לי 🏳️
                                                        </Button>
                                                    )}
                                                    {!excelCompleted && !showHintToUser && (
                                                        <Button onClick={() => setShowHintToUser(true)} variant="warning" className="flex-1 sm:flex-none text-sm">
                                                            תרמוז לי 🤫
                                                        </Button>
                                                    )}
                                                </div>
                                                
                                                {!excelCompleted ? (
                                                    <Button onClick={() => handleExcelCheck(currentStep.expected, currentStep.hints, visibleFields, targetField, currentStep.successMessage)} variant="excel" className="text-lg px-10 py-4 w-full sm:w-auto order-1 sm:order-2 shadow-xl">
                                                        בצע חישוב 🧮
                                                    </Button>
                                                ) : (
                                                    <Button onClick={handleAdvance} variant="success" className="text-lg px-10 py-4 w-full sm:w-auto animate-pulse-glow order-1 sm:order-2 shadow-xl">
                                                        {stepIndex === currentQ.steps.length - 1 ? 'לשאלה הבאה 🚀' : 'המשך לשלב הבא ⬅️'}
                                                    </Button>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    </div>

                    {showSkipModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-slide-up border border-slate-200">
                                <h3 className="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-3">
                                    <span className="text-3xl">🤔</span> רגע לפני שמדלגים...
                                </h3>
                                <p className="text-slate-600 text-lg mb-8 leading-relaxed">
                                    האם תרצה לראות את הפתרון של השלב הנוכחי כדי ללמוד ממנו, או שפשוט נקפוץ ישר לשאלה הבאה?
                                </p>
                                <div className="flex flex-col gap-3">
                                    <Button onClick={() => executeSkip(true)} variant="outline" className="w-full text-lg border-brand-300 text-brand-700 bg-brand-50 hover:bg-brand-100 shadow-sm">
                                        הראה לי את הפתרון לשלב זה 📖
                                    </Button>
                                    <Button onClick={() => executeSkip(false)} variant="primary" className="w-full text-lg shadow-md">
                                        דלג ישר לשאלה הבאה ⏭️
                                    </Button>
                                    <button onClick={() => setShowSkipModal(false)} className="mt-4 text-slate-400 hover:text-slate-600 font-semibold transition-colors">
                                        ביטול, אני אמשיך לנסות
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
